name: Predictive Maintenance CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  data-preparation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib huggingface_hub datasets

      - name: Run data preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/prepare_data.py

  model-training:
    runs-on: ubuntu-latest
    needs: data-preparation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib huggingface_hub datasets

      - name: Train and tune models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/train_model.py

  model-deployment:
    runs-on: ubuntu-latest
    needs: model-training
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install huggingface_hub streamlit pandas scikit-learn joblib

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/deploy_app.py
